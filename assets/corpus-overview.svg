<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" role="img" aria-label="LoopNet v0.2 corpus overview">
  <rect width="880" height="380" rx="14" fill="#111113"/>
  <text x="32" y="38" fill="#f4f4f5" font-family="ui-monospace, monospace" font-size="15" font-weight="700">LoopNet v0.2  structured trajectories for training and replay</text>
  <text x="32" y="58" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="11">545 records · 40% labeled failures · ln/record-v1 schema</text>

  <!-- success vs failure stacked bar -->
  <text x="32" y="100" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="10">outcome mix</text>
  <rect x="32" y="110" width="816" height="40" rx="8" fill="#27272a"/>
  <rect x="32" y="110" width="490" height="40" rx="8" fill="#22c55e" opacity="0.9"/>
  <rect x="522" y="110" width="326" height="40" rx="0" fill="#ef4444" opacity="0.85"/>
  <text x="260" y="135" fill="#052e16" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle" font-weight="700">327 success (60%)</text>
  <text x="684" y="135" fill="#fef2f2" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle" font-weight="700">218 failure (40%)</text>

  <!-- source bars -->
  <text x="32" y="185" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="10">provenance</text>
  <rect x="120" y="200" width="660" height="28" rx="6" fill="#52525b"/>
  <text x="848" y="219" fill="#e4e4e7" font-family="ui-monospace, monospace" font-size="11" text-anchor="end">500 seed</text>
  <text x="120" y="192" fill="#71717a" font-family="ui-monospace, monospace" font-size="10">synthetic seed corpus</text>

  <rect x="120" y="248" width="59" height="28" rx="6" fill="#38bdf8"/>
  <text x="848" y="267" fill="#7dd3fc" font-family="ui-monospace, monospace" font-size="11" text-anchor="end">45 captured · 8%</text>
  <text x="120" y="240" fill="#71717a" font-family="ui-monospace, monospace" font-size="10">LoopGym SimEnv runs</text>

  <!-- use cases -->
  <rect x="32" y="300" width="190" height="56" rx="8" fill="#27272a"/>
  <text x="127" y="322" fill="#f97316" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">ReplayEnv</text>
  <text x="127" y="340" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">zero API cost</text>

  <rect x="238" y="300" width="190" height="56" rx="8" fill="#27272a"/>
  <text x="333" y="322" fill="#22c55e" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">Fine-tuning</text>
  <text x="333" y="340" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">loop structure, not chat</text>

  <rect x="444" y="300" width="190" height="56" rx="8" fill="#27272a"/>
  <text x="539" y="322" fill="#a855f7" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">LoopBench holdout</text>
  <text x="539" y="340" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">generalization test</text>

  <rect x="650" y="300" width="198" height="56" rx="8" fill="#27272a"/>
  <text x="749" y="322" fill="#38bdf8" font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">HF + JSONL</text>
  <text x="749" y="340" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">one-line load</text>
</svg>
