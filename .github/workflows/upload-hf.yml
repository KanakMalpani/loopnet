name: Upload to Hugging Face

on:
  workflow_dispatch:
    inputs:
      repo_id:
        description: HuggingFace dataset repo id
        required: true
        default: KanakMalpani/loopnet-seed-v0.1
      private:
        description: Private dataset
        type: boolean
        default: false

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jsonschema pandas pyarrow huggingface_hub

      - name: Validate corpus
        run: python scripts/validate_record.py --require-count 500

      - name: Upload to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Add HF_TOKEN to repository secrets (see PUBLISHING.md)"
            exit 1
          fi
          python scripts/upload_hf.py --export-parquet --upload --repo-id "${{ github.event.inputs.repo_id }}" \
            ${{ github.event.inputs.private == 'true' && '--private' || '' }}
