name: validate-loopnet

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate seed corpus
        run: python scripts/generate_seed.py --count 500 --seed 42
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Validate records
        run: python scripts/validate_record.py --require-count 500
        env:
          PYTHONPATH: ${{ github.workspace }}
